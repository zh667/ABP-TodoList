# ===========================================
# TodoList - 一键部署（使用预构建镜像）
# ===========================================
# 使用方式:
#   1. 将此文件保存为 docker-compose.yml
#   2. 运行: docker compose up -d
#   3. 等待 1-2 分钟，访问 http://localhost
#   4. 默认账号: admin / 1q2w3E*
# ===========================================

services:
  # ---------- 数据库 ----------
  mysql:
    image: mysql:8
    container_name: todolist-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: TodoListDb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - todolist-network

  # ---------- 数据库迁移 (一次性) ----------
  migrator:
    image: linqian667/todolist-migrator:latest
    container_name: todolist-migrator
    environment:
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=TodoListDb;User=root;Password=1234;"
      OpenIddict__Applications__TodoList_App__RootUrl: "http://localhost"
      OpenIddict__Applications__TodoList_Swagger__RootUrl: "http://localhost"
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure:5
    networks:
      - todolist-network

  # ---------- 后端 API ----------
  api:
    image: linqian667/todolist-api:latest
    container_name: todolist-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=TodoListDb;User=root;Password=1234;"
      # ⭐ 容器内部通信用服务名，不能用 localhost
      App__SelfUrl: "http://todolist-api:8080"
      AuthServer__Authority: "http://todolist-api:8080"
      # 浏览器访问的地址仍然用 localhost
      App__ClientUrl: "http://localhost"
      App__CorsOrigins: "http://localhost"
      App__RedirectAllowedUrls: "http://localhost"
      AuthServer__RequireHttpsMetadata: "false"
    depends_on:
      migrator:
        condition: service_completed_successfully
    networks:
      - todolist-network

  # ---------- 前端 (Nginx) ----------
  web:
    image: linqian667/todolist-web:latest
    container_name: todolist-web
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - todolist-network

volumes:
  mysql_data:

networks:
  todolist-network:
    driver: bridge
