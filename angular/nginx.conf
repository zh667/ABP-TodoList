server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # 反向代理: 所有 ABP 后端路径（统一匹配）
    # ============================================
    # 包括: API、登录页、OpenIddict、ABP框架端点、
    #       主题资源、bundled JS/CSS、Swagger 等
    location ~ ^/(api|Account|connect|\.well-known|Abp|abp|libs|swagger|_content|_framework|_bundles|Themes|global-styles\.css)(/|$) {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # Angular SPA 路由（fallback，放最后）
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
