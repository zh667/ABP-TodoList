server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ----- 反向代理: ABP API -----
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- 反向代理: ABP 登录/注册页面（MVC Razor Pages）-----
    location /Account/ {
        proxy_pass http://api:8080/Account/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- 反向代理: OpenIddict 认证端点 -----
    location /.well-known/ {
        proxy_pass http://api:8080/.well-known/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /connect/ {
        proxy_pass http://api:8080/connect/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- 反向代理: ABP 框架端点 -----
    location /Abp/ {
        proxy_pass http://api:8080/Abp/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /abp/ {
        proxy_pass http://api:8080/abp/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- 反向代理: ABP 后端静态资源（登录页 CSS/JS/字体等）-----
    location /libs/ {
        proxy_pass http://api:8080/libs/;
        proxy_set_header Host $host;
    }

    location /global-styles.css {
        proxy_pass http://api:8080/global-styles.css;
        proxy_set_header Host $host;
    }

    location /_framework/ {
        proxy_pass http://api:8080/_framework/;
        proxy_set_header Host $host;
    }

    location /_content/ {
        proxy_pass http://api:8080/_content/;
        proxy_set_header Host $host;
    }

    # ----- 反向代理: Swagger -----
    location /swagger/ {
        proxy_pass http://api:8080/swagger/;
        proxy_set_header Host $host;
    }

    # ----- Angular SPA 路由（放最后，作为 fallback）-----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
